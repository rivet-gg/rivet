[services.api]
	[services.api.build]
		package = "rivet"
		args = ["--services", "api"]

	[services.api.api]
		singleton = false

		[[services.api.api.router.mounts]]
			deprecated = true
			subdomain = "admin.api"
			strip-prefix = "/v1"
			add-path = "/admin"

		[[services.api.api.router.mounts]]
			deprecated = true
			subdomain = "auth.api"
			strip-prefix = "/v1"
			add-path = "/auth"

		[[services.api.api.router.mounts]]
			deprecated = true
			subdomain = "cf-verification.api"
			strip-prefix = "/v1"
			add-path = "/cf-verification"

		[[services.api.api.router.mounts]]
			deprecated = true
			subdomain = "cloud.api"
			strip-prefix = "/v1"
			add-path = "/cloud"

		[[services.api.api.router.mounts]]
			deprecated = true
			subdomain = "group.api"
			strip-prefix = "/v1"
			add-path = "/group"

		[[services.api.api.router.mounts]]
			deprecated = true
			subdomain = "identity.api"
			strip-prefix = "/v1"
			add-path = "/identity"

		[[services.api.api.router.mounts]]
			deprecated = true
			subdomain = "job.api"
			strip-prefix = "/v1"
			add-path = "/job"

		[[services.api.api.router.mounts]]
			deprecated = true
			subdomain = "kv.api"
			strip-prefix = "/v1"
			add-path = "/kv"

		[[services.api.api.router.mounts]]
			deprecated = true
			subdomain = "matchmaker.api"
			strip-prefix = "/v1"
			add-path = "/matchmaker"

		[[services.api.api.router.mounts]]
			deprecated = true
			subdomain = "portal.api"
			strip-prefix = "/v1"
			add-path = "/portal"

		[[services.api.api.router.mounts]]
			deprecated = true
			subdomain = "status.api"
			strip-prefix = "/v1"
			add-path = "/status"

	[services.api.resources.single-node]
		cpu = 250
		memory = 256

	[services.api.resources.distributed]
		cpu = 1000
		memory = 1024

[services.api-internal]
	[services.api-internal.build]
		package = "rivet"
		args = ["--services", "api-internal"]

	[services.api-internal.api]
		singleton = false

	[services.api-internal.resources.single-node]
		cpu = 50
		memory = 64

	[services.api-internal.resources.distributed]
		cpu = 1000
		memory = 512

[services.standalone]
	[services.standalone.build]
		package = "rivet"
		args = ["--services", "standalone"]

	[services.standalone.headless]
		singleton = true

	[services.standalone.resources.single-node]
		cpu = 250
		# See SVC-3413
		memory = 512

	[services.standalone.resources.distributed]
		cpu = 1000
		memory = 1024

[services.oneshot]
	[services.oneshot.build]
		package = "rivet"
		args = ["--services", "oneshot"]

	[services.oneshot.oneshot]

	[services.oneshot.resources.single-node]
		cpu = 250
		memory = 256

	[services.oneshot.resources.distributed]
		cpu = 1000
		memory = 1024

[services.cron]
	[services.cron.build]
		package = "rivet"
		args = ["--services", "cron"]

	[services.cron.periodic]
		cron = "0 0 * * *"

	[services.cron.resources.single-node]
		cpu = 250
		memory = 256

	[services.cron.resources.distributed]
		cpu = 1000
		memory = 1024
