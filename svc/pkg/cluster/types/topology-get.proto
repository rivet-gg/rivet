syntax = "proto3";

package rivet.backend.pkg.cluster.topology_get;

import "proto/common.proto";

message Request {
	repeated rivet.common.Uuid cluster_ids = 1;
}

message Response {
	message Server {
		rivet.common.Uuid server_id = 1;
		string node_id = 2;
		float cpu = 3; // % of total
		float memory = 4; // % of total
		float disk = 5; // % of total
	}

	message Cluster {
		rivet.common.Uuid cluster_id = 1;
		repeated Server servers = 2;
	}

	repeated Cluster clusters = 1;
}
